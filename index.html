<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hasu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <header class="top-bar">
            <h2>Hasu</h2>
        </header>

        <main class="chat-main">
            <div class="chat-messages-container" id="messages-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- Initial bot message -->
                    <div class="message-row bot-row">
                        <div class="bot-avatar">
                            H
                        </div>
                        <div class="message-content">
                            <p>Hi, I am Hasu your personal chat partner</p>
                        </div>
                    </div>
                </div>
                
                <div class="typing-indicator-container" id="typing-indicator" style="display: none;">
                    <div class="message-row bot-row">
                        <div class="bot-avatar">H</div>
                        <div class="message-content">
                            <div class="typing-dots">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <form id="chat-form" class="chat-form">
                    <div class="input-wrapper">
                        <textarea id="message-input" placeholder="Message Hasu..." rows="1"></textarea>
                        <button type="submit" class="send-btn" id="send-btn" aria-label="Send message" disabled>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </button>
                    </div>
                </form>
                <div class="footer-text">
                    Hasu can make mistakes. Consider verifying important information.
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
